<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; }
#map { width:100vw; height:100vh; }

/* в”Җв”Җ кІҖмғү нҢЁл„җ в”Җв”Җ */
#search-panel {
  position:absolute; top:15px; left:15px; z-index:1000;
  background:white; border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  padding:14px; width:310px; max-height:80vh;
  display:flex; flex-direction:column;
}
#search-panel h2 {
  font-size:14px; font-weight:700; color:#e74c3c;
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
#search-input {
  width:100%; padding:8px 12px;
  border:2px solid #e0e0e0; border-radius:8px;
  font-size:13px; outline:none; transition:border-color .2s;
}
#search-input:focus { border-color:#e74c3c; }
#result-count { font-size:11px; color:#999; margin-top:6px; margin-bottom:2px; }
#search-results { overflow-y:auto; flex:1; max-height:280px; }
.result-item {
  padding:8px 10px; border-radius:7px; cursor:pointer;
  border-bottom:1px solid #f0f0f0; transition:background .15s;
}
.result-item:hover, .result-item.active {
  background:#fff0f0; border-left:3px solid #e74c3c; padding-left:7px;
}
.result-item .seg-name { font-size:13px; font-weight:600; color:#222;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.result-item .seg-meta { font-size:11px; color:#888; margin-top:2px; }

/* в”Җв”Җ мғҒм„ё нҢЁл„җ в”Җв”Җ */
#detail-panel {
  position:absolute; bottom:20px; right:15px; z-index:1000;
  background:white; border-radius:14px;
  box-shadow:0 4px 24px rgba(0,0,0,.2);
  padding:18px; width:300px; max-height:75vh;
  overflow-y:auto; display:none;
}
#detail-panel.visible { display:block; }
#detail-close {
  position:absolute; top:10px; right:12px; cursor:pointer;
  font-size:20px; color:#999; background:none; border:none; line-height:1;
}
#detail-close:hover { color:#333; }
#detail-title { font-size:14px; font-weight:700; color:#e74c3c;
  margin-bottom:3px; padding-right:22px; word-break:break-word; }
#detail-id { font-size:11px; color:#aaa; margin-bottom:12px; }

.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
.stat-box {
  background:#f9f9f9; border-radius:10px;
  padding:9px 10px; text-align:center;
}
.stat-box .val { font-size:17px; font-weight:700; color:#222; }
.stat-box .lbl { font-size:10px; color:#888; margin-top:2px; }
.stat-box.hl .val { color:#e74c3c; }

.overlap-section { margin-top:4px; }
.overlap-title {
  font-size:12px; font-weight:700; color:#555;
  margin-bottom:8px; padding-bottom:4px;
  border-bottom:1px solid #eee;
}
.partner-card {
  background:#f9f9f9; border-radius:8px;
  padding:9px 11px; margin-bottom:7px; cursor:pointer;
  border-left:3px solid #bbb; transition:border-color .15s, background .15s;
}
.partner-card:hover { background:#fff5f0; border-color:#e74c3c; }
.partner-card .p-name { font-size:12px; font-weight:600; color:#222;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.partner-card .p-meta { font-size:11px; color:#888; margin-top:3px; }
.bar-section { margin-top:7px; }
.bar-row { margin-bottom:5px; }
.bar-label-row {
  display:flex; justify-content:space-between;
  font-size:10px; color:#666; margin-bottom:2px;
}
.bar-label-row .bar-lbl { font-weight:600; }
.bar-label-row .bar-pct { font-weight:700; }
.bar-track {
  height:7px; background:#e8e8e8; border-radius:4px; overflow:hidden;
}
.bar-fill {
  height:100%; border-radius:4px; transition:width .4s;
}
.bar-fill.high  { background:#27ae60; }
.bar-fill.mid   { background:#f39c12; }
.bar-fill.low   { background:#e74c3c; }
.diff-row {
  font-size:10px; color:#888; margin-top:6px; text-align:right;
}

/* в”Җв”Җ лІ”лЎҖ в”Җв”Җ */
#legend {
  position:absolute; bottom:20px; left:15px; z-index:1000;
  background:white; border-radius:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  padding:10px 14px; font-size:11px;
}
#legend h4 { font-size:11px; color:#555; margin-bottom:6px; font-weight:700; }
.leg { display:flex; align-items:center; gap:7px; margin-bottom:4px; }
.leg-line { width:26px; height:4px; border-radius:2px; }
.leg-dash {
  width:26px; height:0; border-top:3px dashed;
  border-radius:0;
}
</style>

  while(i < enc.length) {
    let b, shift=0, result=0;
    do { b=enc.charCodeAt(i++)-63; result|=(b&0x1f)<<shift; shift+=5; } while(b>=0x20);
    lat += (result&1) ? ~(result>>1) : result>>1;
    shift=0; result=0;
    do { b=enc.charCodeAt(i++)-63; result|=(b&0x1f)<<shift; shift+=5; } while(b>=0x20);
    lng += (result&1) ? ~(result>>1) : result>>1;
    pts.push([lat/1e5, lng/1e5]);
  }
  return pts;
}

function getColor(n) {
  if(n >= 3) return '#e74c3c';
  if(n === 2) return '#e67e22';
  return '#3498db';
}
function getWeight(n) { return n >= 3 ? 4 : 3; }

// в”Җв”Җ м§ҖлҸ„ мҙҲкё°нҷ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const map = L.map('map').setView([37.5665, 126.9780], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

// segment_id вҶ’ polyline л Ҳмқҙм–ҙ л§Өн•‘
const polylineMap = {};
let selectedId = null;
let partnerLayers = [];

// лӘЁл“  м„ёк·ёлЁјнҠё к·ёлҰ¬кё°
SEGMENTS.forEach(seg => {
  if(!seg.polyline) return;
  const pts = decodePolyline(seg.polyline);
  if(!pts.length) return;
  const color = getColor(seg.n_partners);
  const weight = getWeight(seg.n_partners);

  const pl = L.polyline(pts, {color, weight, opacity:0.75, smoothFactor:1}).addTo(map);
  pl._segId = seg.segment_id;

  pl.on('mouseover', function() {
    if(selectedId !== seg.segment_id)
      this.setStyle({weight: weight+2, opacity:1});
    this.bindTooltip(
      `<b>${seg.name}</b><br>мӨ‘ліө: ${seg.n_partners}к°ң кІҪлЎң / мқҙмҡ©мһҗ: ${seg.users.toLocaleString()}лӘ…`,
      {sticky:true}
    ).openTooltip();
  });
  pl.on('mouseout', function() {
    if(selectedId !== seg.segment_id)
      this.setStyle({weight, opacity:0.75});
    this.closeTooltip();
  });
  pl.on('click', () => selectSegment(seg.segment_id));
  polylineMap[seg.segment_id] = {pl, pts, color, weight, seg};
});

// в”Җв”Җ м„ёк·ёлЁјнҠё м„ нғқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function clearSelection() {
  if(selectedId !== null) {
    const prev = polylineMap[selectedId];
    if(prev) prev.pl.setStyle({color:prev.color, weight:prev.weight, opacity:0.75});
  }
  partnerLayers.forEach(l => map.removeLayer(l));
  partnerLayers = [];
  selectedId = null;
}

function selectSegment(sid, fromSearch) {
  clearSelection();
  const entry = polylineMap[sid];
  if(!entry) return;
  selectedId = sid;

  // м„ нғқ кІҪлЎң н•ҳмқҙлқјмқҙнҠё
  entry.pl.setStyle({color:'#fc4c02', weight:6, opacity:1});
  entry.pl.bringToFront();
  if(fromSearch) map.fitBounds(entry.pl.getBounds(), {padding:[60,60]});

  // нҢҢнҠёл„Ҳ кІҪлЎң м җм„  мҳӨлІ„л Ҳмқҙ
  entry.seg.partners.forEach(p => {
    const pEntry = polylineMap[p.id];
    if(pEntry) {
      const dashed = L.polyline(pEntry.pts, {
        color:'#f39c12', weight:4, opacity:0.9,
        dashArray:'8 6'
      }).addTo(map);
      dashed.bringToFront();
      partnerLayers.push(dashed);
    }
  });
  entry.pl.bringToFront();

  // мғҒм„ё нҢЁл„җ
  showDetail(entry.seg);

  // кІҖмғү кІ°кіј active
  document.querySelectorAll('.result-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === sid);
  });
}

function showDetail(seg) {
  document.getElementById('detail-title').textContent   = seg.name;
  document.getElementById('detail-id').textContent      = `Segment ID: ${seg.segment_id}`;
  document.getElementById('s-users').textContent        = seg.users.toLocaleString();
  document.getElementById('s-records').textContent      = seg.records.toLocaleString();
  document.getElementById('s-dist').textContent         = seg.distance.toFixed(3);
  document.getElementById('s-grad').textContent         = seg.gradient.toFixed(1) + '%';
  document.getElementById('overlap-title').textContent  =
    `мӨ‘ліө кІҪлЎң (${seg.n_partners}к°ң)`;

  const list = document.getElementById('partner-list');
  list.innerHTML = '';
  const selName = seg.name.length > 14 ? seg.name.slice(0,14)+'вҖҰ' : seg.name;

  seg.partners.forEach(p => {
    const pShort = p.name.length > 14 ? p.name.slice(0,14)+'вҖҰ' : p.name;

    function barClass(v) { return v>=90?'high':v>=70?'mid':'low'; }

    const card = document.createElement('div');
    card.className = 'partner-card';
    card.innerHTML = `
      <div class="p-name" title="${p.name}">${p.name}</div>
      <div class="p-meta">${p.dist.toFixed(3)}km &nbsp;В·&nbsp; ID: ${p.id}</div>
      <div class="bar-section">
        <div class="bar-row">
          <div class="bar-label-row">
            <span class="bar-lbl" title="${seg.name}">"${selName}" мӨ‘ кІ№м№ҳлҠ” кө¬к°„</span>
            <span class="bar-pct">${p.this2other.toFixed(1)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${barClass(p.this2other)}" style="width:${p.this2other}%"></div>
          </div>
        </div>
        <div class="bar-row">
          <div class="bar-label-row">
            <span class="bar-lbl" title="${p.name}">"${pShort}" мӨ‘ кІ№м№ҳлҠ” кө¬к°„</span>
            <span class="bar-pct">${p.other2this.toFixed(1)}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill ${barClass(p.other2this)}" style="width:${p.other2this}%"></div>
          </div>
        </div>
        <div class="diff-row">кұ°лҰ¬ м°Ёмқҙ ${p.diff.toFixed(1)}%</div>
      </div>`;
    card.addEventListener('click', () => {
      selectSegment(p.id, true);
    });
    list.appendChild(card);
  });

  document.getElementById('detail-panel').classList.add('visible');
}

// в”Җв”Җ лӢ«кё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
document.getElementById('detail-close').addEventListener('click', () => {
  clearSelection();
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
});

// в”Җв”Җ кІҖмғү в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const resultCount   = document.getElementById('result-count');

function renderResults(filtered) {
  searchResults.innerHTML = '';
  if(!filtered.length) { resultCount.textContent='кІ°кіј м—ҶмқҢ'; return; }
  resultCount.textContent = `${filtered.length}к°ң м„ёк·ёлЁјнҠё`;
  filtered.slice(0,100).forEach(seg => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.dataset.id = seg.segment_id;
    div.innerHTML = `
      <div class="seg-name">${seg.name}</div>
      <div class="seg-meta">
        ID: ${seg.segment_id} &nbsp;В·&nbsp; ${seg.distance.toFixed(2)}km
        &nbsp;В·&nbsp; мӨ‘ліө ${seg.n_partners}к°ң
        &nbsp;В·&nbsp; ${seg.users.toLocaleString()}лӘ…
      </div>`;
    div.addEventListener('click', () => selectSegment(seg.segment_id, true));
    searchResults.appendChild(div);
  });
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if(!q) { resultCount.textContent=''; searchResults.innerHTML=''; return; }
  const filtered = SEGMENTS
    .filter(s => s.name.toLowerCase().includes(q) || String(s.segment_id).includes(q))
    .sort((a,b) => b.users - a.users);
  renderResults(filtered);
});
</script>
