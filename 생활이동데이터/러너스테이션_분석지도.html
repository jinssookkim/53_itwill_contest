<html>
<head>
<meta charset="utf-8">
<title>서울 러너스테이션 입지 분석</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Malgun Gothic', sans-serif; }
#map { width:100vw; height:100vh; }
#sidebar {
    position:absolute; top:0; left:0; width:280px; height:100vh;
    background:rgba(15,15,25,0.92); color:#fff; z-index:1000;
    display:flex; flex-direction:column; padding:16px;
    backdrop-filter:blur(8px);
}
#sidebar h2 { font-size:13px; color:#aaa; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; }
#search {
    width:100%; padding:10px 12px; border-radius:8px;
    border:1px solid #333; background:#1a1a2e; color:#fff;
    font-size:13px; outline:none; margin-bottom:12px;
}
#search:focus { border-color:#4fc3f7; }
#station-list { flex:1; overflow-y:auto; }
#station-list::-webkit-scrollbar { width:4px; }
#station-list::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
.station-item {
    padding:8px 10px; border-radius:6px; cursor:pointer;
    margin-bottom:4px; display:flex; align-items:center; gap:8px;
    transition:background 0.15s;
}
.station-item:hover { background:rgba(255,255,255,0.08); }
.station-item.active { background:rgba(79,195,247,0.15); border-left:3px solid #4fc3f7; }
.dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.station-name { font-size:13px; font-weight:500; }
.station-sub { font-size:11px; color:#888; }
#legend { margin-top:12px; padding-top:12px; border-top:1px solid #222; }
#legend h3 { font-size:11px; color:#888; margin-bottom:8px; letter-spacing:1px; }
.legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:12px; color:#ccc; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
#info-panel {
    position:absolute; bottom:20px; right:20px; width:270px;
    background:rgba(15,15,25,0.95); color:#fff; z-index:1000;
    border-radius:12px; padding:18px; display:none;
    backdrop-filter:blur(8px); border:1px solid #333;
}
#info-panel h3 { font-size:16px; font-weight:700; margin-bottom:4px; }
.line-badge {
    display:inline-block; font-size:11px; padding:2px 8px;
    border-radius:20px; background:#333; color:#aaa; margin-bottom:10px;
}
.cluster-badge {
    display:inline-block; font-size:11px; padding:3px 10px;
    border-radius:20px; margin-bottom:12px; font-weight:600;
}
.info-row { display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; }
.info-label { color:#888; }
.info-val { color:#fff; font-weight:500; }
.dest-item {
    font-size:11px; padding:4px 8px; margin-bottom:3px;
    background:#1a1a2e; border-radius:6px;
    display:flex; justify-content:space-between;
}
#buffer-btn {
    width:100%; margin-top:12px; padding:8px;
    border-radius:8px; border:none; cursor:pointer;
    font-size:12px; font-weight:600; transition:all 0.2s;
    background:#1a3a4a; color:#4fc3f7;
}
#buffer-btn:hover { background:#1a4a5a; }
#close-btn {
    position:absolute; top:12px; right:12px;
    background:none; border:none; color:#666;
    cursor:pointer; font-size:16px;
}
#filter-bar {
    position:absolute; top:16px; right:16px; z-index:1000;
    display:flex; gap:8px; flex-wrap:wrap;
}
.filter-btn {
    padding:6px 14px; border-radius:20px; border:none;
    font-size:12px; font-weight:600; cursor:pointer;
    background:rgba(15,15,25,0.85); color:#aaa;
    backdrop-filter:blur(8px); transition:all 0.2s;
    border:1px solid #333;
}
.filter-btn.active { color:#fff; border-color:transparent; }
</style>

<div id="map"></div>

<div id="sidebar">
    <h2>🏃 러너스테이션 분석</h2>
    <input id="search" type="text" placeholder="역 검색...">
    <div id="station-list"></div>
    <div id="legend">

        <div class="legend-item"><div class="legend-dot" style="background:#ffb74d"></div>클러스터 C</div>

    </div>
</div>

</div>

<div id="info-panel">

    <h3 id="info-name"></h3>
    <span class="line-badge" id="info-line"></span><br>
    <span class="cluster-badge" id="info-cluster"></span>
    <div class="info-row">

        <span class="info-val" id="info-pop"></span>
    </div>
    <div style="margin-top:10px;margin-bottom:6px;font-size:11px;color:#888;">TOP 3 목적지</div>
    <div id="info-dest"></div>
    <button id="buffer-btn" onclick="toggleBuffer()">🔵 800m 반경 보기</button>
</div>

L.control.zoom({position:'bottomright'}).addTo(map);

let markers = {};
let currentBuffer = null;
let activeStation = null;
let currentFilter = -1;

const maxPop = Math.max(...STATIONS.map(s => s.total_pop));

function getRadius(pop) {
    return 6 + (pop / maxPop) * 18;
}

// 마커 생성
STATIONS.forEach(s => {
    const color = COLORS[s.cluster] || "#aaa";
    const r = getRadius(s.total_pop);
    const m = L.circleMarker([s.위도, s.경도], {
        radius: r, color: color, fillColor: color,
        fillOpacity: 0.75, weight: 1.5, opacity: 0.9
    }).addTo(map);
    m.on('click', () => showInfo(s));
    markers[s.역사명] = {marker: m, data: s, color: color};
});

// 사이드바 역 목록
function renderList(filter='', clusterFilter=-1) {
    const list = document.getElementById('station-list');
    list.innerHTML = '';
    const sorted = [...STATIONS]
        .filter(s => s.역사명.includes(filter))
        .filter(s => clusterFilter === -1 || s.cluster === clusterFilter)
        .sort((a,b) => b.total_pop - a.total_pop);
    sorted.forEach(s => {
        const item = document.createElement('div');
        item.className = 'station-item' + (activeStation === s.역사명 ? ' active' : '');
        item.innerHTML = `
            <div class="dot" style="background:${COLORS[s.cluster]}"></div>
            <div>
                <div class="station-name">${s.역사명}</div>
                <div class="station-sub">${s.호선} · ${s.total_pop.toLocaleString()}명</div>
            </div>`;
        item.onclick = () => {
            map.setView([s.위도, s.경도], 15);
            showInfo(s);
        };
        list.appendChild(item);
    });
}
renderList();

document.getElementById('search').addEventListener('input', e => {
    renderList(e.target.value, currentFilter);
});

// 클러스터 필터
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = parseInt(btn.dataset.cluster);
        Object.values(markers).forEach(({"marker":m, "data":s}) => {
            if (currentFilter === -1 || s.cluster === currentFilter) {
                m.setStyle({fillOpacity:0.75, opacity:0.9});
            } else {
                m.setStyle({fillOpacity:0.08, opacity:0.15});
            }
        });
        renderList(document.getElementById('search').value, currentFilter);
    });
});

// 정보 패널
function showInfo(s) {
    activeStation = s.역사명;
    renderList(document.getElementById('search').value, currentFilter);
    const panel = document.getElementById('info-panel');
    panel.style.display = 'block';
    document.getElementById('info-name').textContent = s.역사명;
    document.getElementById('info-line').textContent = s.호선;
    const cb = document.getElementById('info-cluster');
    cb.textContent = CLUSTER_LABELS[s.cluster] || `클러스터 ${s.cluster}`;
    cb.style.background = COLORS[s.cluster] + '33';
    cb.style.color = COLORS[s.cluster];
    document.getElementById('info-pop').textContent = s.total_pop.toLocaleString() + '명';
    const destEl = document.getElementById('info-dest');
    destEl.innerHTML = s.top_dest.map(d =>
        `<div class="dest-item"><span style="color:#ccc">${d.공원명}</span><span style="color:#4fc3f7">${Math.round(d.total_pop).toLocaleString()}명</span></div>`
    ).join('');
    if (currentBuffer) { currentBuffer.remove(); currentBuffer = null; }
}

function closePanel() {
    document.getElementById('info-panel').style.display = 'none';
    if (currentBuffer) { currentBuffer.remove(); currentBuffer = null; }
    activeStation = null;
    renderList(document.getElementById('search').value, currentFilter);
}

function toggleBuffer() {
    if (!activeStation) return;
    const s = markers[activeStation].data;
    if (currentBuffer) { currentBuffer.remove(); currentBuffer = null; document.getElementById('buffer-btn').textContent = '🔵 800m 반경 보기'; return; }
    currentBuffer = L.circle([s.위도, s.경도], {
        radius: 800, color: '#4fc3f7', fillColor: '#4fc3f7',
        fillOpacity: 0.08, weight: 1.5
    }).addTo(map);
    document.getElementById('buffer-btn').textContent = '🔵 800m 반경 숨기기';
}
</script>
</body>
</html>
